<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: Georgia, serif; }
  .wrap { position: relative; width: 1200px; height: 630px; }
  img.bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.28) 100%); }
  .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 48px 56px; }
  .top { display: flex; align-items: center; gap: 14px; }
  .line { width: 36px; height: 1px; background: #B8965A; }
  .date { color: #B8965A; font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .left { display: flex; flex-direction: column; gap: 10px; }
  .title { color: white; font-size: 72px; font-weight: 300; line-height: 1.05; }
  .sub { color: rgba(255,255,255,0.6); font-size: 22px; }
  .sig { color: #B8965A; font-size: 26px; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <img class="bg" src="https://sweeney.family/savannah-hero.jpg" />
  <div class="overlay"></div>
  <div class="content">
    <div class="top">
      <div class="line"></div>
      <span class="date">March 12–16, 2026</span>
    </div>
    <div class="bottom">
      <div class="left">
        <span class="title">Welcome to Savannah</span>
        <span class="sub">Ford Field &amp; River Club · Richmond Hill, GA</span>
      </div>
      <span class="sig">D &amp; A</span>
    </div>
  </div>
</div>
</body>
</html>
